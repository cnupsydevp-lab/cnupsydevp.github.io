<script>
document.addEventListener('DOMContentLoaded', () => {
  if (typeof POSTS === 'undefined' || !POSTS.newsletter?.length) return;

  const list = document.getElementById('newsletter-list');
  list.innerHTML = POSTS.newsletter.map(p => `
    <a href="post.html?page=newsletter&id=${p.id}" class="notice-item">
      <span class="notice-date">${p.date}</span>
      <span class="badge ${p.badge}" style="white-space: nowrap;">${p.badgeText}</span>
      <span class="notice-title">${p.title}</span>
    </a>
  `).join('');
});
</script>
