<!-- 소식지 모달 -->

    <div class="nl-modal-backdrop" id="nl-modal-backdrop"></div>
    <div class="nl-modal-box">

<script src="posts.js"></script>
<script src="script.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  if (typeof POSTS === 'undefined' || !POSTS.newsletter?.length) return;

  const list = document.getElementById('newsletter-list');
  list.innerHTML = POSTS.newsletter.map(p => {
    if (p.image) {
      return `
        <button class="insta-item" data-id="${p.id}" aria-label="${p.title}">
          <img src="${p.image}" alt="${p.title}">
          <div class="insta-overlay">
            <span class="insta-overlay-title">${p.title}</span>
            <span class="insta-overlay-date">${p.date}</span>
          </div>
        </button>`;
    } else {
      return `
        <button class="insta-item" data-id="${p.id}" aria-label="${p.title}">
          <div class="insta-text-card">
            <span class="insta-text-date">${p.date}</span>
            <span class="insta-text-title">${p.title}</span>
          </div>
          <div class="insta-overlay">
            <span class="insta-overlay-title">${p.title}</span>
            <span class="insta-overlay-date">${p.date}</span>
          </div>
        </button>`;
    }
  }).join('');

  // 모달
  const modal    = document.getElementById('nl-modal');
  const backdrop = document.getElementById('nl-modal-backdrop');
  const closeBtn = document.getElementById('nl-modal-close');

  function openModal(p) {
    document.getElementById('nl-modal-date').textContent = p.date;
    document.getElementById('nl-modal-title').textContent = p.title;
    document.getElementById('nl-modal-content').innerHTML = p.body || '';
    const imgWrap = document.getElementById('nl-modal-img-wrap');
    imgWrap.innerHTML = p.image
      ? `<img src="${p.image}" alt="${p.title}">`
      : '';
    imgWrap.hidden = !p.image;
    modal.hidden = false;
    document.body.style.overflow = 'hidden';
    closeBtn.focus();
  }

  function closeModal() {
    modal.hidden = true;
    document.body.style.overflow = '';
  }

  list.addEventListener('click', e => {
    const btn = e.target.closest('[data-id]');
    if (!btn) return;
    const p = POSTS.newsletter.find(x => x.id === +btn.dataset.id);
    if (p) openModal(p);
  });

  backdrop.addEventListener('click', closeModal);
  closeBtn.addEventListener('click', closeModal);
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
});
</script>
</body>
