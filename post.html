                <ul class="nav-dropdown-menu">

</header>

<div class="page-header">
    <div class="container">
        <span class="eyebrow" id="post-eyebrow"></span>
        <h1 id="post-page-title"></h1>
    </div>
</div>

<section class="section section-light">
    <div class="container">
        <a href="#" class="post-back" id="post-back">← 목록으로</a>
        <div class="post-article">
            <div class="post-meta">
                <span class="notice-date" id="post-date"></span>
                <span class="badge" id="post-badge"></span>
            </div>
            <h2 class="post-title-heading" id="post-title"></h2>
            <hr>
            <div class="post-body" id="post-body">
                <p style="color:var(--muted)">게시글을 불러오는 중…</p>
            </div>
        </div>
    </div>
</section>

<footer class="site-footer">
    <div class="container">
        <div class="footer-inner">
            <div class="footer-brand">
                <span class="footer-logo">DPWL</span>

            </div>
            <nav class="footer-nav" aria-label="바로가기">
                <a href="pi.html">지도교수</a>
                <a href="research.html">연구분야</a>
                <a href="activities.html">연구활동</a>

            </nav>
        </div>
        <p class="footer-copy">&copy; 2026 DPWL. All rights reserved.</p>
    </div>
</footer>

<script src="posts.js"></script>
<script src="script.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(window.location.search);
  const page = params.get('page');
  const id = parseInt(params.get('id'), 10);

  const PAGE_META = {
    notices: { eyebrow: 'Announcements', title: '공지사항', navHref: 'notices.html' },
    participation: { eyebrow: 'Research Participation', title: '연구참여', navHref: 'participation.html' },
    newsletter: { eyebrow: 'Newsletter', title: '소식지', navHref: 'newsletter.html' }
  };

  const meta = PAGE_META[page];
  if (!meta) {
    document.getElementById('post-body').innerHTML = '<p style="color:var(--muted)">잘못된 페이지 요청입니다.</p>';
    return;
  }

  const post = (typeof POSTS !== 'undefined') && POSTS[page] && POSTS[page].find(p => p.id === id);

  document.getElementById('post-eyebrow').textContent = meta.eyebrow;
  document.getElementById('post-page-title').textContent = meta.title;
  document.getElementById('post-back').href = meta.navHref;

  const navLink = document.querySelector(`.nav-links a[href="${meta.navHref}"]`);
  if (navLink) navLink.classList.add('active');

  if (!post) {
    document.getElementById('post-body').innerHTML = '<p style="color:var(--muted)">게시글을 찾을 수 없습니다.</p>';
    return;
  }

  document.title = `DPWL — ${post.title}`;
  document.getElementById('post-date').textContent = post.date;

  const badge = document.getElementById('post-badge');
  badge.className = `badge ${post.badge}`;
  badge.textContent = post.badgeText;

  document.getElementById('post-title').textContent = post.title;
  document.getElementById('post-body').innerHTML = post.body;
});
</script>
</body>
</html>
